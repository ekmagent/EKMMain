name: SEO Autoresearch Loop

# RE-ENABLED 2026-07-12 with a restructured cadence. The original design (all
# scripts daily, Opus everywhere, raw output pushed to main unverified) burned
# ~$155/mo and once froze production for 11 weeks. The fix is not "no
# automation" — it's spend proportional to updates:
#
#   daily-signals    cron, ~pennies  — measurement only (Perplexity + Serper),
#                                      commits TSV logs, never touches app/
#   weekly-optimiser cron, LLM spend — research + page quality fixes + new
#                                      approved pages, build-gated, then
#                                      IndexNow ping (Bing powers ChatGPT search)
#   content-drafts   manual only     — off-site draft generators (press, video,
#                                      social, quotes). These produce files a
#                                      human must publish elsewhere, so they run
#                                      on demand, not on a timer.
#
# Human-in-the-loop is POST-loop: nothing here waits for approval, but every
# bot commit is reviewable via git log / the Actions run summary. The stop-
# checks are automated instead: validate-pages.js + the build gate.
#
# NOTE: job `if:` conditions discriminate schedule events by exact cron string —
# a bare `github.event_name == 'schedule'` would fire every job on every cron.

on:
  schedule:
    - cron: "0 18 * * *" # daily signals — 2pm ET (EDT)
    - cron: "0 15 * * 1" # weekly optimiser — Mondays 11am ET (3h before daily to avoid push races)
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Which scripts to run"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - daily
          - weekly
          - drafts

# Runs queue behind each other instead of overlapping — a long weekly run
# and the daily cron were racing on git push.
concurrency:
  group: seo-autoresearch
  cancel-in-progress: false

jobs:
  daily-signals:
    runs-on: ubuntu-latest
    # Measurement only: is anyone citing/ranking us? No LLM page edits, no
    # app/ changes, so no build gate needed. Cost: Perplexity + Serper pennies.
    if: |
      github.event.schedule == '0 18 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.run_mode == 'daily' || github.event.inputs.run_mode == 'all'))
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install script dependencies
        run: |
          cd scripts
          npm install

      - name: Run citation oracle (Perplexity GEO signal)
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: node scripts/citation-oracle.js

      - name: Run SERP tracker (Serper.dev rank signal)
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        run: node scripts/serp-tracker.js

      - name: Commit signal logs
        run: |
          git config user.name "SEO Research Bot"
          git config user.email "bot@medicareyourself.com"
          git add citation-log.tsv serp-log.tsv
          git diff --cached --quiet || git commit -m "SEO signals: $(date +'%Y-%m-%d')"
          git pull --rebase --autostash
          git push

  weekly-optimiser:
    runs-on: ubuntu-latest
    # The spend job: pulls ranking/citation data, runs the Opus quality audit
    # (orchestrator — moved here from daily; weekly cadence is the main cost
    # cut), builds newly-approved Compact Keyword pages and PAA FAQ pages,
    # validates, build-gates, pushes, then pings IndexNow.
    if: |
      github.event.schedule == '0 15 * * 1' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.run_mode == 'weekly' || github.event.inputs.run_mode == 'all'))
    permissions:
      contents: write
    # Exposed at job level so step `if:` guards can skip Sheets-dependent
    # steps when these secrets aren't configured (env is valid in step ifs;
    # the secrets context is not).
    env:
      INTERNAL_SEO_SHEET_ID: ${{ secrets.INTERNAL_SEO_SHEET_ID }}
      SITE_AUDIT_SHEET_ID: ${{ secrets.SITE_AUDIT_SHEET_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install script dependencies
        run: |
          cd scripts
          npm install

      # The three measurement fetches are soft-fail: a broken analytics API
      # must never block the research/build/publish steps below (2026-07-13:
      # the GA4 step — secrets never configured — aborted the entire weekly
      # run). Downstream scripts fall back to the last committed JSON/TSV.
      - name: Fetch GSC ranking data
        continue-on-error: true
        env:
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: node scripts/fetch-gsc-data.js

      - name: Fetch Bing grounding queries (LLM citation signals)
        continue-on-error: true
        env:
          BING_WEBMASTER_API_KEY: ${{ secrets.BING_WEBMASTER_API_KEY }}
          BING_WEBMASTER_SITE_URL: ${{ secrets.BING_WEBMASTER_SITE_URL }}
        run: node scripts/fetch-bing-grounding.js

      - name: Fetch GA4 AI referral traffic
        continue-on-error: true
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GA4_SERVICE_ACCOUNT_JSON: ${{ secrets.GA4_SERVICE_ACCOUNT_JSON }}
        run: node scripts/fetch-ga4-ai-traffic.js

      - name: Run SEO research loop
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        run: node scripts/seo-research.js

      - name: Run orchestrator (quality audit + gap-fill)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        run: node scripts/orchestrator.js

      # CHECKPOINT — research + orchestrator above are ~80% of this run's
      # token spend. Build-gate and push their output NOW so no later step
      # can discard paid work (attempts 3-4 on 2026-07-13 each lost the full
      # spend to late-step failures).
      - name: Checkpoint — persist research + orchestrator output
        run: |
          npm ci
          npm run build
          node scripts/stamp-page-dates.js
          git config user.name "SEO Research Bot"
          git config user.email "bot@medicareyourself.com"
          for p in page-dates.json results.tsv gsc-data.json gsc-keyword-opportunities.tsv bing-grounding.json bing-grounding-log.tsv ga4-ai-traffic.json ga4-ai-traffic-log.tsv orchestrator-log.tsv app/; do
            [ -e "$p" ] && git add "$p"
          done
          git diff --cached --quiet || git commit -m "SEO weekly checkpoint (research + orchestrator): $(date +'%Y-%m-%d')"
          git pull --rebase --autostash
          git push

      - name: Analyze competitor keywords (Moz + Serper)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          MOZ_API_TOKEN: ${{ secrets.MOZ_API_TOKEN }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON_PATH }}
          COMPETITORS_KEYWORD_SHEET_ID: ${{ secrets.COMPETITORS_KEYWORD_SHEET_ID }}
        run: node scripts/competitor-keyword-analysis.js

      - name: Find Compact Keywords (populate Google Sheets)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          MOZ_API_TOKEN: ${{ secrets.MOZ_API_TOKEN }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON_PATH }}
          COMPETITORS_KEYWORD_SHEET_ID: ${{ secrets.COMPETITORS_KEYWORD_SHEET_ID }}
          INTERNAL_SEO_SHEET_ID: ${{ secrets.INTERNAL_SEO_SHEET_ID }}
          SITE_AUDIT_SHEET_ID: ${{ secrets.SITE_AUDIT_SHEET_ID }}
          DIRECTORY_SEO_SHEET_ID: ${{ secrets.DIRECTORY_SEO_SHEET_ID }}
        run: node scripts/find-compact-keywords.js

      # Sheets-dependent steps skip when their secrets aren't configured
      # (they were never added to this repo) instead of hard-failing the run.
      - name: Build approved Compact Keyword pages
        if: env.INTERNAL_SEO_SHEET_ID != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON_PATH }}
          INTERNAL_SEO_SHEET_ID: ${{ secrets.INTERNAL_SEO_SHEET_ID }}
        run: node scripts/build-compact-pages.js

      - name: Build PAA FAQ pages
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        run: node scripts/build-faq-pages.js

      # NOTE: Screaming Frog crawl (Module 04, Steps 4-6) runs locally via
      # cron on macOS because it requires Screaming Frog SEO Spider installed.
      # Run manually: cd scripts && npm run screaming-frog
      # Results committed as screaming-frog-log.tsv + Google Sheets tab.

      - name: Run site audit (Module 04)
        if: env.SITE_AUDIT_SHEET_ID != ''
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON_PATH }}
          SITE_AUDIT_SHEET_ID: ${{ secrets.SITE_AUDIT_SHEET_ID }}
          MOZ_API_TOKEN: ${{ secrets.MOZ_API_TOKEN }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: node scripts/site-audit.js

      - name: Validate on-page SEO (Module 05)
        run: node scripts/validate-pages.js

      # BUILD GATE — bot page edits must compile before anything is pushed.
      # A single corrupted page (stray comma, 2026-04-23) blocked every
      # production deploy for 11 weeks. Never push app/ changes unverified.
      - name: Build gate — verify site still compiles
        run: |
          npm ci
          npm run build

      - name: Commit results and any page updates
        run: |
          node scripts/stamp-page-dates.js
          git config user.name "SEO Research Bot"
          git config user.email "bot@medicareyourself.com"
          for p in page-dates.json results.tsv gsc-data.json gsc-keyword-opportunities.tsv faq-index.json faq-build-log.tsv bing-grounding.json bing-grounding-log.tsv ga4-ai-traffic.json ga4-ai-traffic-log.tsv compact-keywords-log.tsv compact-keywords-state.json compact-pages-log.tsv competitor-analysis-log.tsv competitor-analysis-state.json orchestrator-log.tsv site-audit-log.tsv screaming-frog-log.tsv page-validation-report.tsv change-log.tsv moz-usage.json app/; do
            [ -e "$p" ] && git add "$p"
          done
          git diff --cached --quiet || git commit -m "SEO autoresearch: weekly update $(date +'%Y-%m-%d')"
          git pull --rebase --autostash
          git push

      # Bing's index powers ChatGPT search — our highest-converting discovery
      # channel. Submit the full sitemap (no dynamic args = no injection
      # surface); IndexNow batches up to 10k URLs. The sleep lets the Vercel
      # deploy triggered by the push above go live first. Soft-fail: a flaky
      # IndexNow endpoint must not mark a successful publish run as failed.
      - name: Submit sitemap to IndexNow (Bing → ChatGPT search)
        run: |
          sleep 180
          node scripts/indexnow-submit.js || echo "IndexNow submission failed (non-fatal)"

      - name: Log page changes (Module 09)
        run: node scripts/change-log.js

  content-drafts:
    runs-on: ubuntu-latest
    # Manual only. These generators produce DRAFTS (press releases, video
    # scripts, social posts, expert quotes) that a human must publish on
    # external platforms — running them on a timer just burns tokens filling
    # folders nobody empties. Trigger when you're ready to publish a batch.
    if: |
      github.event_name == 'workflow_dispatch' && (github.event.inputs.run_mode == 'drafts' || github.event.inputs.run_mode == 'all')
    permissions:
      contents: write
    env:
      DIRECTORY_SEO_SHEET_ID: ${{ secrets.DIRECTORY_SEO_SHEET_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install script dependencies
        run: |
          cd scripts
          npm install

      - name: Generate weekly press release draft
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-press-release.js

      # claude.ai published artifacts carry a noindex meta tag (verified
      # 2026-04-23) — artifact content is repurposed for on-site pages, not
      # parasite SEO.
      - name: Generate weekly Claude Artifact
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-artifacts.js

      - name: Generate video SEO scripts (Module 11)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-video-seo.js

      - name: Generate competitor brand videos (Bonus)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-competitor-videos.js

      - name: Generate X/Threads content (Bonus)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-x-threads.js

      - name: Generate social media posts (Bonus)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-social-posts.js

      - name: Generate expert quotes for link building (Module 12)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/expert-quotes.js

      - name: Suggest directory submissions (Module 12)
        if: env.DIRECTORY_SEO_SHEET_ID != ''
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON_PATH }}
          DIRECTORY_SEO_SHEET_ID: ${{ secrets.DIRECTORY_SEO_SHEET_ID }}
        run: node scripts/directory-tracker.js

      - name: Commit draft outputs
        run: |
          git config user.name "SEO Research Bot"
          git config user.email "bot@medicareyourself.com"
          for p in press-releases/ press-release-log.tsv press-release-state.json artifacts/ artifact-log.tsv artifact-state.json video-scripts/ video-seo-state.json video-seo-log.tsv competitor-videos/ competitor-videos-state.json competitor-videos-log.tsv x-threads/ x-threads-state.json x-threads-log.tsv social-posts/ social-posts-state.json social-posts-log.tsv expert-quotes/ expert-quotes-state.json expert-quotes-log.tsv directory-log.tsv; do
            [ -e "$p" ] && git add "$p"
          done
          git diff --cached --quiet || git commit -m "Content drafts: $(date +'%Y-%m-%d')"
          git pull --rebase --autostash
          git push
